<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruit — Ausb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Questrial&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #F5F0E6;
      --ink:     #1E2A5E;
      --ink-2:   #3D4870;
      --muted:   #C0BDB5;
      --accent:  #CAFF33;
      --code-bg: rgba(30, 42, 94, 0.07);
      --t-border:       rgba(30, 42, 94, 0.12);
      --t-border-inner: rgba(30, 42, 94, 0.08);
    }
    [data-theme="dark"] {
      --bg:      #111318;
      --ink:     #E6E1D6;
      --ink-2:   #9EA3B8;
      --muted:   #6B7280;
      --accent:  #CAFF33;
      --code-bg: rgba(255, 255, 255, 0.09);
      --t-border:       rgba(255, 255, 255, 0.08);
      --t-border-inner: rgba(255, 255, 255, 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:      #111318;
        --ink:     #E6E1D6;
        --ink-2:   #9EA3B8;
        --muted:   #6B7280;
        --accent:  #CAFF33;
        --code-bg: rgba(255, 255, 255, 0.09);
        --t-border:       rgba(255, 255, 255, 0.08);
        --t-border-inner: rgba(255, 255, 255, 0.06);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Questrial', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ─── NAV ─── */
    nav {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 2.25rem 3rem;
    }

    .nav-logo {
      font-family: 'Rozha One', serif;
      font-size: 1.25rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      align-items: baseline;
      gap: 2.5rem;
    }

    .nav-links a {
      font-family: 'Questrial', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.01em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .nav-links a:hover  { opacity: 1; }
    .nav-links a.active { opacity: 1; }

    .nav-contact {
      font-family: 'Questrial', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.01em;
      background: var(--accent);
      text-decoration: none;
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      transition: opacity 0.15s, transform 0.15s;
      opacity: 1;
    }

    .nav-contact:hover { opacity: 0.85; transform: scale(1.03); }
    a.nav-contact { color: #1E2A5E; }
    .nav-linkedin { color: var(--ink); opacity: 0.5; display: flex; align-items: center; transition: opacity 0.15s; border: 1.5px solid currentColor; border-radius: 6px; padding: 2px 3px; }
    .nav-linkedin:hover { opacity: 1; }
    .nav-theme-toggle { background: none; border: 1.5px solid var(--ink); border-radius: 6px; padding: 2px 3px; color: var(--ink); opacity: 0.5; cursor: pointer; display: flex; align-items: center; transition: opacity 0.15s; font-size: 0; line-height: 0; }
    .nav-theme-toggle:hover { opacity: 1; }

    /* ─── HERO ─── */
    .terminal-hero {
      padding: 4rem 3rem 2.5rem;
    }

    .terminal-hero h1 {
      font-family: 'Rozha One', serif;
      font-size: clamp(2.5rem, 5.5vw, 4.5rem);
      line-height: 1.06;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 0.6rem;
    }

    .terminal-hero p {
      font-size: 1rem;
      color: var(--ink-2);
      line-height: 1.6;
    }

    .terminal-hero code {
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      background: var(--code-bg);
      padding: 0.1em 0.4em;
      border-radius: 4px;
    }

    /* ─── TERMINAL ─── */
    .terminal-wrap {
      margin: 0 3rem 8rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--t-border);
    }

    .terminal-chrome {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--code-bg);
      border-bottom: 1px solid var(--t-border-inner);
    }

    .terminal-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .terminal-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .terminal-dots span:nth-child(1) { background: #FF5F57; }
    .terminal-dots span:nth-child(2) { background: #FEBC2E; }
    .terminal-dots span:nth-child(3) { background: #28C840; }

    .terminal-title {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }

    .terminal-output {
      background: var(--code-bg);
      padding: 1.5rem 2rem 1rem;
      max-height: min(60vh, 520px);
      overflow-y: auto;
      min-height: 100px;
    }

    .term-line {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--ink-2);
      opacity: 0;
      animation: termFadeIn 0.12s ease forwards;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .term-line.cmd-echo {
      color: var(--ink);
    }

    .cmd-key {
      color: var(--ink);
      font-weight: 600;
    }

    .term-line.cmd-label {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .term-line.cmd-accent {
      color: var(--accent);
    }

    .term-line.cmd-error {
      color: var(--muted);
      font-style: italic;
    }

    @keyframes termFadeIn {
      to { opacity: 1; }
    }

    .terminal-input-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 2rem;
      background: var(--code-bg);
      border-top: 1px solid var(--t-border-inner);
    }

    .terminal-prompt {
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: var(--accent);
      user-select: none;
      line-height: 1;
    }

    .term-field {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      min-height: 1.4em;
    }

    .term-display {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: var(--ink);
      white-space: pre;
      pointer-events: none;
      position: relative;
      z-index: 1;
    }

    .term-display::before {
      content: attr(data-placeholder);
      color: var(--ink-2);
      display: none;
    }

    .term-display:empty::before { display: inline; }

    .term-display::after {
      content: '';
      display: inline-block;
      width: 3px;
      height: 1.1em;
      background: var(--ink);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: termBlink 1s step-end infinite;
    }

    .term-field:not(:focus-within) .term-display::after {
      opacity: 0;
      animation: none;
    }

    @keyframes termBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .terminal-input {
      position: absolute;
      inset: 0;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: transparent;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      caret-color: transparent;
    }

    @media (max-width: 600px) {
      nav { padding: 1.75rem 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
      .nav-links { gap: 0.6rem; flex-wrap: wrap; }
      .nav-links a { font-size: 0.78rem; }
      .nav-contact { font-size: 0.72rem; padding: 0.35rem 0.75rem; }
      .nav-linkedin { display: none; }
      .nav-theme-toggle { display: none; }
      .terminal-hero { padding: 2.5rem 1.5rem 2rem; }
      .terminal-hero h1 { font-size: clamp(2rem, 8vw, 2.5rem); }
      .terminal-wrap { margin: 0 1.5rem 6rem; border-radius: 8px; }
      .terminal-output { padding: 1rem 1.25rem 0.75rem; max-height: 45vh; }
      .terminal-input-row { padding: 0.75rem 1.25rem; }
      .terminal-input { font-size: 16px; }
      .term-display { font-size: 16px; }
      .term-line { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Ausb</a>
  <div class="nav-links">
    <a href="index.html">Work</a>
    <a href="writing/index.html">Writing</a>
    <a href="about.html">About</a>
    <a href="recruit.html" class="active">Hire</a>
    <a href="http://linkedin.com/in/abedmonson" target="_blank" rel="noopener" class="nav-linkedin" aria-label="LinkedIn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="4.98" cy="3.5" r="2"/><rect x="3.5" y="8" width="2.97" height="13"/><path d="M9 8h3v1.8h.05c.42-.8 1.46-1.8 3-1.8 3.2 0 3.8 2.1 3.8 4.9V21H16v-7.5c0-1.8-.03-4-2.5-4-2.5 0-2.9 1.9-2.9 3.9V21H9V8z"/></svg>
    </a>
    <button class="nav-theme-toggle" id="themeToggle" aria-label="Toggle color mode">
      <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <a href="mailto:austinbedmonson@gmail.com" class="nav-contact">Contact me</a>
  </div>
</nav>

<section class="terminal-hero">
  <h1>Let's talk shop.</h1>
  <p>A terminal felt more honest than a form. Start with <code>help</code>.</p>
</section>

<div class="terminal-wrap" id="termWrap">
  <div class="terminal-chrome">
    <div class="terminal-dots"><span></span><span></span><span></span></div>
    <span class="terminal-title">austin@portfolio ~ %</span>
    <span></span>
  </div>
  <div class="terminal-output" id="termOutput" aria-live="polite" aria-label="Terminal output"></div>
  <div class="terminal-input-row">
    <span class="terminal-prompt">❯</span>
    <div class="term-field" id="termField">
      <span class="term-display" id="termDisplay" data-placeholder="type a command…"></span>
      <input type="text" id="termInput" class="terminal-input"
             autocomplete="off" autocorrect="off" autocapitalize="off"
             spellcheck="false" aria-label="Terminal input" />
    </div>
  </div>
</div>

<script>
  // ─── THEME TOGGLE ───
  const root   = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const icon   = document.getElementById('themeIcon');

  const sunSVG  = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  const moonSVG = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

  function isDark() {
    const stored = localStorage.getItem('theme');
    if (stored) return stored === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function applyTheme(dark) {
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
    icon.innerHTML = dark ? sunSVG : moonSVG;
    toggle.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
  }

  applyTheme(isDark());

  toggle.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') !== 'dark';
    localStorage.setItem('theme', next ? 'dark' : 'light');
    applyTheme(next);
  });

  // ─── TERMINAL ───
  // Lines prefixed with § render as muted uppercase labels.
  // Lines starting with → render in accent color.
  // Empty lines become visual spacers.

  const HELP = `Available commands:

  help          Show available commands
  whoami        Who is Austin?
  systems       How Austin thinks about building systems
  stack         Technical depth and tools
  ai            How AI fits into his engineering workflow
  availability  Current roles and hiring status
  work          Engineering and product experience
  oss           Open source and production contributions
  design        System design principles and tradeoffs
  style         Working style and communication approach
  contact       Get in touch
  clear         Clear the terminal`

  const WHOAMI = `
  Austin Edmonson — platform / infrastructure engineer.

  6+ years across DevOps, platform engineering, and backend systems.

  Currently:
    Platform Engineering @ The Home Depot

  Also building:
    Partida — immigration infrastructure for families navigating complex systems.

  I build systems that reduce complexity: CI/CD pipelines, Kubernetes platforms, and internal tooling that turns operational noise into something engineers can reason about.

  My focus is simple:
  make hard systems understandable, and make understandable systems scalable.
  `;

  const STACK = `
  Platform
    Kubernetes · Terraform · Docker · GitHub Actions · Jenkins

  Backend
    Python · FastAPI · Bash

  Systems
    PostgreSQL · Redis · Linux

  Observability
    Prometheus · Grafana

  Cloud
    GCP · Azure
  `;

  const AI = `
  AI-assisted engineering workflow:

  I use AI as part of system design and implementation — not as a shortcut, but as an extension of how I think through problems.

  Platform engineering:
    Exploring Kubernetes and Terraform patterns
    Accelerating CI/CD and infrastructure design decisions
    Moving faster from unknown systems → working mental models

  Product (Partida):
    Turning ambiguous user workflows into structured backend systems
    Rapid prototyping of architecture and API design
    Iterating on system boundaries early

  Principle:
    AI reduces exploration time.
    Engineering is still responsible for correctness, reliability, and design.
  `;

  const AVAILABILITY = `
  Status:
    Actively exploring platform engineering, infrastructure, and FDE roles.

  Preferred:
    Platform engineering · Staff-level infra · Developer tooling · AI systems

  Location:
    Remote-first, open to hybrid

  Visa:
    US citizen, no sponsorship required

  If you're building systems that need to scale cleanly →
  start with: contact
  `;

  const WORK = `
  The Home Depot — Platform Engineer

  I work on internal platform systems powering CI/CD pipelines for Kubernetes-based infrastructure.

  Focus areas:
    - CI/CD systems for build, scan, test, and deploy workflows
    - Terraform simplification for teams inheriting complex infrastructure
    - Observability systems using Grafana to make system behavior readable

  Partida — Founder / Builder

  Immigration infrastructure for families navigating complex systems.

  Built from scratch using FastAPI and modern backend tooling.
  Focused on clarity, safety, and reducing friction in high-stakes workflows.

  → about.html for full background
  `;

  const OSS = `
  spotify/confidence-sdk-python
    Identified shared mutable class-level state causing instance data leakage
    Proposed fix and validated behavioral correctness

  gocardless/gocardless-pro-python
    Fixed rate_limit returning incorrect type structure
    Added missing test coverage for pagination logic

  Focus:
    Finding subtle correctness and reliability issues in production libraries
  `;

  const STYLE = `
  Engineering style:

  Design-first, implementation-heavy.
  Strong bias toward simplicity and maintainability.

  Works best on:
    Internal platforms
    Developer tooling
    Systems with unclear ownership
    Infrastructure that has grown too complex to reason about

  Communication:
    Writes documentation that engineers actually use
    Translates infrastructure complexity into clear mental models

  Standards:
    Fast, correct, and safe — in that order, but all required.

  Preference:
    Systems should be understandable before they are optimized.
  `;

  const DESIGN = `
  Systems thinking:

  CI/CD pipelines → reliability systems, not automation scripts
  Infrastructure → product surface area for engineers
  Observability → user experience for debugging systems
  Internal tools → leverage multipliers, not utilities

  Goal:
  Make complex systems predictable and operable.
  `;

  const CONTACT = `Email:    austinbedmonson@gmail.com
LinkedIn: linkedin.com/in/abedmonson
GitHub:   github.com/ausbernard

→ Or hit "Contact me" in the nav.`;

  const HIRE      = `Permission granted. Now email me.`;
  const LS        = `about.html  index.html  recruit.html  writing/`;
  const VIM       = `[terminal has exited vim after 4 years of trying]`;
  const CATRESUME = `Try: availability  work  oss  —  or download from about.html`;

  const output   = document.getElementById('termOutput');
  const input    = document.getElementById('termInput');
  const display  = document.getElementById('termDisplay');
  const termWrap = document.getElementById('termWrap');

  function updateDisplay() {
    display.textContent = input.value;
  }
  input.addEventListener('input', updateDisplay);

  let cmdHistory = [];
  let historyIdx = -1;

  const KEY_VALUE = /^( {0,4})(\w[\w-]*)( {2,})(.+)$/;

  function printLine(text, cls) {
    const div = document.createElement('div');
    div.className = 'term-line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  function printKeyValue(indent, key, gap, desc) {
    const div = document.createElement('div');
    div.className = 'term-line';
    const keySpan = document.createElement('span');
    keySpan.className = 'cmd-key';
    keySpan.textContent = indent + key;
    const descSpan = document.createElement('span');
    descSpan.textContent = gap + desc;
    div.appendChild(keySpan);
    div.appendChild(descSpan);
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  function printBlock(text) {
    text.split('\n').forEach(line => {
      if (line === '') {
        printLine(' ');
      } else if (line.startsWith('§')) {
        printLine(line.slice(1), 'cmd-label');
      } else if (line.trimStart().startsWith('→')) {
        printLine(line, 'cmd-accent');
      } else {
        const m = line.match(KEY_VALUE);
        if (m) {
          printKeyValue(m[1], m[2], m[3], m[4]);
        } else {
          printLine(line);
        }
      }
    });
    printLine(' ');
  }

  function clearOutput() {
    output.innerHTML = '';
  }

  function printBanner() {
    printBlock(HELP);
  }

  const COMMANDS = {
    help:               () => printBlock(HELP),
    whoami:             () => printBlock(WHOAMI),
    stack:              () => printBlock(STACK),
    availability:       () => printBlock(AVAILABILITY),
    work:               () => printBlock(WORK),
    oss:                () => printBlock(OSS),
    style:              () => printBlock(STYLE),
    contact:            () => printBlock(CONTACT),
    clear:              () => { clearOutput(); printBanner(); },
    'sudo hire austin': () => printBlock(HIRE),
    ls:                 () => printBlock(LS),
    vim:                () => printBlock(VIM),
    'cat resume':       () => printBlock(CATRESUME),
    ai:                 () => printBlock(AI),
    design:             () => printBlock(DESIGN),
  };

  function runCommand(raw) {
    const cmd = raw.trim().toLowerCase();
    if (!cmd) return;

    printLine('❯  ' + raw.trim(), 'cmd-echo');
    cmdHistory.unshift(raw.trim());
    historyIdx = -1;

    if (COMMANDS[cmd]) {
      COMMANDS[cmd]();
    } else {
      printLine('bash: ' + cmd + ': command not found', 'cmd-error');
      printLine(' ');
    }
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = input.value;
      input.value = '';
      updateDisplay();
      runCommand(val);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIdx < cmdHistory.length - 1) {
        historyIdx++;
        input.value = cmdHistory[historyIdx];
        updateDisplay();
        setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIdx > 0) {
        historyIdx--;
        input.value = cmdHistory[historyIdx];
      } else {
        historyIdx = -1;
        input.value = '';
      }
      updateDisplay();
    }
  });

  termWrap.addEventListener('click', () => input.focus());

  printBanner();
  input.focus();
</script>
</body>
</html>
